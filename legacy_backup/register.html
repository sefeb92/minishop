<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Mini Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-page {
            background-color: var(--primary-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .login-header {
            background: transparent;
            padding: 20px 0;
        }
        .login-header .container {
            display: flex;
            align-items: center;
        }
        .login-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 2rem;
            font-weight: 700;
            color: white;
            text-decoration: none;
        }
        .login-logo i {
            font-size: 2.5rem;
        }
        .login-title {
            color: white;
            font-size: 1.5rem;
            margin-left: 20px;
            font-weight: 500;
        }
        .header-help {
            margin-left: auto;
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .login-main {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 40px 0;
        }

        .login-branding {
            color: white;
            max-width: 500px;
            text-align: center;
            margin: 0 auto;
        }
        .login-branding i {
            font-size: 8rem;
            margin-bottom: 20px;
        }
        .login-branding h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            font-weight: 700;
        }
        .login-branding p {
            font-size: 1.5rem;
            line-height: 1.5;
        }

        .login-box {
            background: white;
            border-radius: var(--radius-md);
            padding: 30px;
            width: 400px;
            box-shadow: var(--shadow-lg);
            margin: 0 auto;
        }

        .login-box-header {
            margin-bottom: 30px;
        }
        .login-box-header h2 {
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--text-dark);
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.3s;
        }
        .form-control:focus {
            border-color: var(--primary-color);
        }
        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            cursor: pointer;
        }

        .btn-login {
            width: 100%;
            background: var(--primary-color);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            text-transform: uppercase;
            transition: background 0.3s;
        }
        .btn-login:hover {
            background: var(--primary-hover);
        }

        .login-divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
            color: var(--text-light);
            font-size: 0.85rem;
        }
        .login-divider::before,
        .login-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border-color);
        }
        .login-divider span {
            padding: 0 10px;
        }

        .social-login {
            display: flex;
            gap: 10px;
        }
        .btn-social {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: white;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.3s;
        }
        .btn-social:hover {
            background: var(--bg-color);
        }
        .btn-social.facebook i {
            color: #1877f2;
        }
        .btn-social.google img {
            width: 18px;
        }

        .login-terms {
            margin-top: 25px;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-light);
            line-height: 1.5;
        }
        .login-terms a {
            color: var(--primary-color);
        }

        .login-register {
            margin-top: 20px;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-light);
        }
        .login-register a {
            color: var(--primary-color);
            font-weight: 500;
        }

        /* Responsive layout */
        .login-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            align-items: center;
            width: 100%;
        }
        @media (max-width: 768px) {
            .login-container {
                grid-template-columns: 1fr;
            }
            .login-branding {
                display: none;
            }
            .login-box {
                width: 100%;
                max-width: 400px;
            }
        }
    </style>
</head>
<body class="login-page">

    <header class="login-header">
        <div class="container">
            <a href="index.html" class="login-logo">
                <i class="fa-solid fa-bag-shopping"></i>
                Mini Shop
            </a>
            <span class="login-title">Đăng ký</span>
            <a href="#" class="header-help">Bạn cần giúp đỡ?</a>
        </div>
    </header>

    <main class="login-main container">
        <div class="login-container">
            <div class="login-branding">
                <i class="fa-solid fa-bag-shopping"></i>
                <h1>Mini Shop</h1>
                <p>Nền tảng thương mại điện tử<br>yêu thích ở Đông Nam Á & Việt Nam</p>
            </div>

            <div class="login-box">
                <div class="login-box-header">
                    <h2>Đăng ký</h2>
                </div>

                <form action="index.html">
                    <div class="form-group">
                        <input type="text" class="form-control" placeholder="Email/Số điện thoại" required>
                    </div>
                    <div class="form-group">
                        <input type="text" class="form-control" placeholder="Họ và Tên" required>
                    </div>
                    <div class="form-group">
                        <input type="text" class="form-control" placeholder="Tên tài khoản" required>
                    </div>
                    <div class="form-group">
                        <input type="password" class="form-control" placeholder="Mật khẩu" id="passwordInput" required>
                        <i class="fa-regular fa-eye password-toggle" onclick="togglePassword('passwordInput', this)"></i>
                    </div>
                    <div class="form-group">
                        <input type="password" class="form-control" placeholder="Nhập lại mật khẩu" id="confirmPasswordInput" required>
                        <i class="fa-regular fa-eye password-toggle" onclick="togglePassword('confirmPasswordInput', this)"></i>
                    </div>
                    
                    <button type="submit" class="btn-login">Đăng ký</button>
                </form>

                <div class="login-divider">
                    <span>HOẶC</span>
                </div>

                <div class="social-login">
                    <button class="btn-social facebook">
                        <i class="fa-brands fa-facebook"></i> Facebook
                    </button>
                    <button class="btn-social google">
                        <i class="fa-brands fa-google" style="color: #ea4335;"></i> Google
                    </button>
                </div>

                <div class="login-terms">
                    Bằng việc đăng kí, bạn đã đồng ý với Mini Shop về<br>
                    <a href="#">Điều khoản dịch vụ</a> & <a href="#">Chính sách bảo mật</a>
                </div>

                <div class="login-register">
                    Bạn đã có tài khoản? <a href="login.html">Đăng nhập</a>
                </div>
            </div>
        </div>
    </main>

    <script>
        function togglePassword(inputId, iconElement) {
            const pwdInput = document.getElementById(inputId);
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                iconElement.classList.remove('fa-eye');
                iconElement.classList.add('fa-eye-slash');
            } else {
                pwdInput.type = 'password';
                iconElement.classList.remove('fa-eye-slash');
                iconElement.classList.add('fa-eye');
            }
        }
    </script>
</body>
</html>
